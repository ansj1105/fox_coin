services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: foxya-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-coin_system_cloud}
      POSTGRES_USER: ${DB_USER:-foxya}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-in-production}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - coin-shared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-foxya} -d ${DB_NAME:-coin_system_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ==================== DB Proxy (Active-Standby 접속 엔드포인트) ====================
  db-proxy:
    image: haproxy:2.9-alpine
    container_name: foxya-db-proxy
    user: "0:0"
    environment:
      DB_PROXY_PORT: ${DB_PROXY_PORT:-5432}
      DB_PRIMARY_HOST: ${DB_PRIMARY_HOST:-postgres}
      DB_PRIMARY_PORT: ${DB_PRIMARY_PORT:-5432}
      DB_STANDBY_HOST: ${DB_STANDBY_HOST:-postgres}
      DB_STANDBY_PORT: ${DB_STANDBY_PORT:-5432}
      DB_PROXY_STANDBY_FALLBACK_ENABLED: ${DB_PROXY_STANDBY_FALLBACK_ENABLED:-false}
    ports:
      - "${DB_PROXY_BIND_ADDRESS:-127.0.0.1}:${DB_PROXY_BIND_PORT:-15432}:${DB_PROXY_PORT:-5432}"
    volumes:
      - ./ops/db-proxy/haproxy.cfg.template:/usr/local/etc/haproxy/haproxy.cfg.template:ro
    command:
      - /bin/sh
      - -ec
      - |
        cp /usr/local/etc/haproxy/haproxy.cfg.template /usr/local/etc/haproxy/haproxy.cfg
        sed -i \
          -e "s/__DB_PROXY_PORT__/$${DB_PROXY_PORT}/g" \
          -e "s/__DB_PRIMARY_HOST__/$${DB_PRIMARY_HOST}/g" \
          -e "s/__DB_PRIMARY_PORT__/$${DB_PRIMARY_PORT}/g" \
          -e "s/__DB_STANDBY_HOST__/$${DB_STANDBY_HOST}/g" \
          -e "s/__DB_STANDBY_PORT__/$${DB_STANDBY_PORT}/g" \
          -e "s/__DB_STANDBY_SERVER_OPTIONS__/$$( [ \"$${DB_PROXY_STANDBY_FALLBACK_ENABLED}\" = \"true\" ] && printf '%s' 'check backup' || printf '%s' 'check backup disabled' )/g" \
          /usr/local/etc/haproxy/haproxy.cfg
        exec haproxy -W -db -f /usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coin-shared
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: foxya-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - coin-shared
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== Application ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - APP_ENV=${APP_ENV:-prod}
    image: foxya-coin-api:${APP_VERSION:-latest}
    container_name: foxya-api
    environment:
      TZ: Asia/Seoul
      APP_ENV: ${APP_ENV:-prod}
      # JVM
      JAVA_OPTS: ${JAVA_OPTS:--Xmx1024m -Xms512m -XX:+UseG1GC}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_KEY_LEGACY: ${ENCRYPTION_KEY_LEGACY:-}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID}
      GOOGLE_ANDROID_REDIRECT_URI: ${GOOGLE_ANDROID_REDIRECT_URI}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      GOOGLE_IOS_REDIRECT_URI: ${GOOGLE_IOS_REDIRECT_URI}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      KAKAO_ANDROID_REDIRECT_URI: ${KAKAO_ANDROID_REDIRECT_URI}
      KAKAO_IOS_REDIRECT_URI: ${KAKAO_IOS_REDIRECT_URI}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_SERVICE_ID: ${APPLE_SERVICE_ID}
      APPLE_IOS_CLIENT_ID: ${APPLE_IOS_CLIENT_ID}
      APPLE_PRIVATE_KEY_PATH: ${APPLE_PRIVATE_KEY_PATH}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI}
      APPLE_IOS_REDIRECT_URI: ${APPLE_IOS_REDIRECT_URI}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      DB_HOST: ${DB_HOST:-db-proxy}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coin_system_cloud}
      DB_USER: ${DB_USER:-foxya}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-in-production}
      DB_POOL_SIZE: ${APP_DB_POOL_SIZE:-12}
      BACKGROUND_JOBS_ENABLED: ${APP_BACKGROUND_JOBS_ENABLED:-true}
      DEPOSIT_SCANNER_API_KEY: ${DEPOSIT_SCANNER_API_KEY:-}
      KORION_WITHDRAW_CALLBACK_API_KEY: ${KORION_WITHDRAW_CALLBACK_API_KEY:-}
      TRON_HOT_WALLET_ADDRESS: ${TRON_HOT_WALLET_ADDRESS:-}
      KORION_WITHDRAW_BRIDGE_ENABLED: ${KORION_WITHDRAW_BRIDGE_ENABLED:-false}
      KORION_WITHDRAW_API_URL: ${KORION_WITHDRAW_API_URL:-}
      KORION_WITHDRAW_API_KEY: ${KORION_WITHDRAW_API_KEY:-}
      KORION_WITHDRAW_API_PATH: ${KORION_WITHDRAW_API_PATH:-/api/withdrawals}
      KORION_WITHDRAW_BRIDGE_CURRENCY_CODES: ${KORION_WITHDRAW_BRIDGE_CURRENCY_CODES:-KORI,FOXYA}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DB_ALERT_MONITOR_ENABLED: ${DB_ALERT_MONITOR_ENABLED:-true}
      DB_ALERT_POLL_MS: ${DB_ALERT_POLL_MS:-15000}
      DB_ALERT_CONNECTION_RATIO_THRESHOLD: ${DB_ALERT_CONNECTION_RATIO_THRESHOLD:-0.75}
      DB_ALERT_LOCK_WAIT_THRESHOLD: ${DB_ALERT_LOCK_WAIT_THRESHOLD:-3}
      DB_ALERT_SYNC_REP_WAIT_THRESHOLD: ${DB_ALERT_SYNC_REP_WAIT_THRESHOLD:-1}
      DB_ALERT_CONSECUTIVE_BREACHES: ${DB_ALERT_CONSECUTIVE_BREACHES:-2}
      PROFILE_IMAGE_UPLOAD_DIR: ${PROFILE_IMAGE_UPLOAD_DIR:-/app/storage/profile-images}
      PROFILE_IMAGE_MODERATION_ENABLED: ${PROFILE_IMAGE_MODERATION_ENABLED:-false}
      GOOGLE_CLOUD_VISION_API_KEY: ${GOOGLE_CLOUD_VISION_API_KEY:-}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-/var/secrets/firebase-service-account.json}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/firebase-service-account.json}
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./storage/profile-images:/app/storage/profile-images
      - /var/www/AuthKey_6ZQZJLZ467.p8:/var/www/AuthKey_6ZQZJLZ467.p8:ro
      - ${FCM_CREDENTIALS_HOST_PATH:-/var/www/korion-wallet-69f0a-firebase-adminsdk-fbsvc-215386f23c.json}:/var/secrets/firebase-service-account.json:ro
    depends_on:
      db-proxy:
        condition: service_started
      redis:
        condition: service_healthy
      tron-service:
        condition: service_started
    networks:
      - coin-shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # 앱 2번 인스턴스 (무중단 배포용: Nginx가 app + app2 둘 다 바라보고, 한 대씩 순서 업데이트)
  app2:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - APP_ENV=${APP_ENV:-prod}
    image: foxya-coin-api:${APP_VERSION:-latest}
    container_name: foxya-api-2
    environment:
      TZ: Asia/Seoul
      APP_ENV: ${APP_ENV:-prod}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx1024m -Xms512m -XX:+UseG1GC}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_KEY_LEGACY: ${ENCRYPTION_KEY_LEGACY:-}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID}
      GOOGLE_ANDROID_REDIRECT_URI: ${GOOGLE_ANDROID_REDIRECT_URI}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      GOOGLE_IOS_REDIRECT_URI: ${GOOGLE_IOS_REDIRECT_URI}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      KAKAO_ANDROID_REDIRECT_URI: ${KAKAO_ANDROID_REDIRECT_URI}
      KAKAO_IOS_REDIRECT_URI: ${KAKAO_IOS_REDIRECT_URI}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_SERVICE_ID: ${APPLE_SERVICE_ID}
      APPLE_IOS_CLIENT_ID: ${APPLE_IOS_CLIENT_ID}
      APPLE_PRIVATE_KEY_PATH: ${APPLE_PRIVATE_KEY_PATH}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI}
      APPLE_IOS_REDIRECT_URI: ${APPLE_IOS_REDIRECT_URI}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      DB_HOST: ${DB_HOST:-db-proxy}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coin_system_cloud}
      DB_USER: ${DB_USER:-foxya}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-in-production}
      DB_POOL_SIZE: ${APP2_DB_POOL_SIZE:-8}
      BACKGROUND_JOBS_ENABLED: ${APP2_BACKGROUND_JOBS_ENABLED:-false}
      DEPOSIT_SCANNER_API_KEY: ${DEPOSIT_SCANNER_API_KEY:-}
      KORION_WITHDRAW_CALLBACK_API_KEY: ${KORION_WITHDRAW_CALLBACK_API_KEY:-}
      TRON_HOT_WALLET_ADDRESS: ${TRON_HOT_WALLET_ADDRESS:-}
      KORION_WITHDRAW_BRIDGE_ENABLED: ${KORION_WITHDRAW_BRIDGE_ENABLED:-false}
      KORION_WITHDRAW_API_URL: ${KORION_WITHDRAW_API_URL:-}
      KORION_WITHDRAW_API_KEY: ${KORION_WITHDRAW_API_KEY:-}
      KORION_WITHDRAW_API_PATH: ${KORION_WITHDRAW_API_PATH:-/api/withdrawals}
      KORION_WITHDRAW_BRIDGE_CURRENCY_CODES: ${KORION_WITHDRAW_BRIDGE_CURRENCY_CODES:-KORI,FOXYA}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DB_ALERT_MONITOR_ENABLED: ${DB_ALERT_MONITOR_ENABLED:-true}
      DB_ALERT_POLL_MS: ${DB_ALERT_POLL_MS:-15000}
      DB_ALERT_CONNECTION_RATIO_THRESHOLD: ${DB_ALERT_CONNECTION_RATIO_THRESHOLD:-0.75}
      DB_ALERT_LOCK_WAIT_THRESHOLD: ${DB_ALERT_LOCK_WAIT_THRESHOLD:-3}
      DB_ALERT_SYNC_REP_WAIT_THRESHOLD: ${DB_ALERT_SYNC_REP_WAIT_THRESHOLD:-1}
      DB_ALERT_CONSECUTIVE_BREACHES: ${DB_ALERT_CONSECUTIVE_BREACHES:-2}
      PROFILE_IMAGE_UPLOAD_DIR: ${PROFILE_IMAGE_UPLOAD_DIR:-/app/storage/profile-images}
      PROFILE_IMAGE_MODERATION_ENABLED: ${PROFILE_IMAGE_MODERATION_ENABLED:-false}
      GOOGLE_CLOUD_VISION_API_KEY: ${GOOGLE_CLOUD_VISION_API_KEY:-}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-/var/secrets/firebase-service-account.json}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/firebase-service-account.json}
    # 포트 미노출 (Nginx가 내부 네트워크로만 접근)
    volumes:
      - ./logs:/app/logs
      - ./storage/profile-images:/app/storage/profile-images
      - /var/www/AuthKey_6ZQZJLZ467.p8:/var/www/AuthKey_6ZQZJLZ467.p8:ro
      - ${FCM_CREDENTIALS_HOST_PATH:-/var/www/korion-wallet-69f0a-firebase-adminsdk-fbsvc-215386f23c.json}:/var/secrets/firebase-service-account.json:ro
    depends_on:
      db-proxy:
        condition: service_started
      redis:
        condition: service_healthy
      tron-service:
        condition: service_started
    networks:
      - coin-shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==================== TRON Service (Node.js) — 2컨테이너 (Nginx 로드밸런싱) ====================
  tron-service:
    build:
      context: ${TRON_SERVICE_PATH:-/var/www/coin_publish}
      dockerfile: Dockerfile
    image: foxya-tron-service:${TRON_VERSION:-latest}
    container_name: foxya-tron-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db-proxy}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-coin_system_cloud}
      - DB_USER=${DB_USER:-foxya}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-in-production}
      - REDIS_HOST=redis
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Seoul
    networks:
      - coin-shared
    depends_on:
      db-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./logs/tron:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\" || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  tron-service2:
    image: foxya-tron-service:${TRON_VERSION:-latest}
    container_name: foxya-tron-service-2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db-proxy}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-coin_system_cloud}
      - DB_USER=${DB_USER:-foxya}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-in-production}
      - REDIS_HOST=redis
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Seoul
    networks:
      - coin-shared
    depends_on:
      db-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./logs/tron2:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\" || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  tron-worker:
    image: foxya-tron-service:${TRON_VERSION:-latest}
    container_name: foxya-tron-worker
    restart: unless-stopped
    command: ["npm", "run", "worker:deposit"]
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db-proxy}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-coin_system_cloud}
      - DB_USER=${DB_USER:-foxya}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-in-production}
      - REDIS_HOST=redis
      - NODE_ENV=production
      - TZ=Asia/Seoul
      - COIN_SERVICE_URL=${COIN_SERVICE_URL:-http://foxya-api:8080}
    networks:
      - coin-shared
    depends_on:
      db-proxy:
        condition: service_started
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      tron-service:
        condition: service_healthy
    volumes:
      - ./logs/tron-worker:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep 'node src/workers/deposit-index.js' | grep -v grep >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==================== Prometheus (Metrics Collection) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: foxya-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.external-url=https://api.korion.io.kr/prometheus/'
      - '--web.route-prefix=/'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - coin-shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== Grafana (Metrics Visualization) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: foxya-grafana
    ports:
      - "127.0.0.1:3001:3000"  # 로컬호스트만 접근 가능 (nginx를 통해서만 접근)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # dev.korion.io.kr 루트로 서비스 (서브경로 없음 → 리다이렉트 루프 근본 해결)
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_ROOT_URL=https://dev.korion.io.kr/
      - GF_SERVER_DOMAIN=dev.korion.io.kr
      - GF_SERVER_COOKIE_SAMESITE=none
      - GF_SERVER_COOKIE_SECURE=true
      - GF_SERVER_ENABLE_GZIP=true
      - GF_SERVER_ENABLE_ROUTER_LOGGING=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - coin-shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== Nginx (Reverse Proxy) ====================
  nginx:
    image: nginx:alpine
    container_name: foxya-nginx
    ports:
      - "127.0.0.1:8088:80"
      - "127.0.0.1:8444:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      # 프론트엔드 빌드 파일 마운트 (프로덕션)
      - ./frontend/dist:/usr/share/nginx/html/frontend:ro
      # Let's Encrypt 인증서 갱신용 (certbot 사용 시)
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
      - app2
      # tron-service는 선택사항 (없어도 nginx 시작 가능)
    networks:
      - coin-shared
    restart: unless-stopped
    # DNS 설정 (Docker 내부 DNS 사용)
    dns:
      - 127.0.0.11
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  coin-shared:  # coin_csms와 공유하는 외부 네트워크
    external: true
