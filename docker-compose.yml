services:
  postgres:
    image: postgres:15-alpine
    container_name: foxya-coin-postgres
    environment:
      POSTGRES_DB: foxya_coin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fox_coin_foxya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: foxya-coin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fox_coin_foxya-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foxya-coin-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      APP_ENV: prod
      ENV: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-/var/secrets/firebase-service-account.json}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/firebase-service-account.json}
    volumes:
      - ./src/main/resources/config.json:/app/config.json
      - ./logs:/app/logs
      - ${FCM_CREDENTIALS_HOST_PATH:-/var/www/korion-wallet-69f0a-firebase-adminsdk-fbsvc-215386f23c.json}:/var/secrets/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fox_coin_foxya-network
      - coin-shared
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  fox_coin_foxya-network:  # coin_csms와 공유하는 네트워크
    driver: bridge
  coin-shared:
    external: true
