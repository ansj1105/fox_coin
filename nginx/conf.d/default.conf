# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name korion.io.kr www.korion.io.kr api.korion.io.kr _;  # dev.korion.io.kr는 Grafana 전용(아래 443 블록); HTTP는 default로 301
    
    # Let's Encrypt 인증서 갱신을 위한 경로 (certbot 사용 시)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # TRON 서비스 API는 HTTPS 리다이렉트 하지 않음 (3000포트 관련 요청)
    location ~ ^/api/(login|logout|wallet|balance|transfer|tx|transactions|deploy|token-stats|config|deployments|transfers|health) {
        # TRON 서비스로 직접 프록시 (HTTPS 리다이렉트 없음)
        proxy_pass http://tron_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 버퍼링
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # 에러 처리
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }
    
    # HTTP 요청을 HTTPS로 리다이렉트 (TRON 서비스 제외)
    location / {
        return 301 https://$host$request_uri;
    }
}

# 메인 서버 블록 (HTTP + HTTPS)
server {
    listen 80;
    listen 443 ssl http2;
    server_name korion.io.kr www.korion.io.kr api.korion.io.kr;  # dev.korion.io.kr는 Grafana 전용 블록에서만 처리 (아래 참고)
    
    # SSL 인증서 설정
    # Let's Encrypt 인증서 사용 시
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # 자체 서명 인증서 사용 시 (개발/테스트용) - 주석 처리
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL 설정
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 로그
    access_log /var/log/nginx/foxya_access.log main;
    error_log /var/log/nginx/foxya_error.log warn;

    # Health Check (Nginx 자체)
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # TRON Service API 프록시 (우선순위: 더 구체적인 경로가 먼저)
    # /api/login, /api/wallet, /api/balance, /api/transfer 등 TRON 서비스 관련 API
    location ~ ^/api/(login|logout|wallet|balance|transfer|tx|transactions|deploy|token-stats|config|deployments|transfers) {
        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://tron_service;
        proxy_http_version 1.1;
        
        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 버퍼링
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # TRON Service Health Check
    location /api/health {
        proxy_pass http://tron_service/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Admin API 프록시 (coin_csms 프로젝트로 라우팅)
    # /api/v1/admin/ 경로는 coin_csms로 프록시
    # resolver를 사용하여 동적 DNS 해석 (csms-api가 없어도 Nginx 시작 가능)
    location ~ ^/api/v1/admin/ {
        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # resolver를 사용하여 동적 DNS 해석
        # 변수를 사용한 proxy_pass는 resolver가 필요함
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $csms_backend "csms-api:8080";
        proxy_pass http://$csms_backend;
        proxy_http_version 1.1;
        
        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 버퍼링
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # 에러 처리
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }

    # API 프록시 (백엔드 API 요청 - 나머지 모든 /api/ 경로)
    # Admin API보다 나중에 정의하여 우선순위 낮춤
    location /api/ {
        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://foxya_api;
        proxy_http_version 1.1;
        
        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 버퍼링
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 프론트엔드 정적 파일 서빙 (프로덕션)
    # 프론트엔드 빌드 파일을 /usr/share/nginx/html/frontend에 마운트
    location / {
        root /usr/share/nginx/html/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 정적 파일 캐싱
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Swagger UI
    location /api-docs {
        proxy_pass http://foxya_api/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI Spec
    location /openapi.yaml {
        proxy_pass http://foxya_api/openapi.yaml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health Check (App)
    location /health {
        access_log off;
        proxy_pass http://foxya_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Prometheus Metrics Endpoint
    location /metrics {
        proxy_pass http://foxya_api/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 메트릭은 인증 없이 접근 가능 (필요시 IP 제한 추가)
    }

    # Grafana 프록시 (HTTPS를 통해 접근)
    location /6s9ex74204/grafana {
        # 루트 → /login 으로 전달 (Grafana / 301 루프 방지)
        rewrite ^/6s9ex74204/grafana/?$ /login break;
        # .../grafana/login 또는 .../grafana/login/ → Grafana에 GET /login 전달 (Grafana는 /login/ 을 /login 으로 301 하므로 끝 슬래시 없음만 사용)
        rewrite ^/6s9ex74204/grafana/login/?$ /login break;
        rewrite ^/6s9ex74204/grafana/(.*)$ /$1 break;
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        
        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # HTTPS로 설정
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        
        # Grafana subpath 설정
        proxy_set_header X-Forwarded-Prefix /6s9ex74204/grafana;
        proxy_set_header X-Forwarded-Uri /6s9ex74204/grafana;
        
        # 쿠키 경로 수정 (subpath 인증 문제 해결)
        # Grafana가 설정한 쿠키 경로를 subpath로 변환
        # 모든 쿠키의 경로를 subpath로 변경
        proxy_cookie_path / /6s9ex74204/grafana/;
        # 쿠키 도메인은 변경하지 않음
        proxy_cookie_domain off;
        
        # WebSocket 지원 (Grafana에서 필요할 수 있음)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 타임아웃 설정 (Grafana 초기 로드에 시간이 걸릴 수 있으므로 증가)
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 버퍼링
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # 리다이렉트 처리
        # Grafana가 GF_SERVER_ROOT_URL(도메인)으로 보내는 Location을, 클라이언트가 접속한 호스트로 덮어쓰기
        proxy_redirect https://korion.io.kr/ $scheme://$host/;
        proxy_redirect http://korion.io.kr/ $scheme://$host/;
        # Grafana가 .../grafana/login/ (끝 슬래시)로 보내면 .../grafana/login 으로 통일 (Grafana는 /login/ 요청을 /login 으로 301 하므로, Location을 끝 슬래시 없음으로 고정해 루프 제거)
        proxy_redirect https://korion.io.kr/6s9ex74204/grafana/login/ $scheme://$host/6s9ex74204/grafana/login;
        proxy_redirect http://korion.io.kr/6s9ex74204/grafana/login/ $scheme://$host/6s9ex74204/grafana/login;
        # 내부 경로를 외부 경로로 변환
        proxy_redirect http://grafana:3000/ /6s9ex74204/grafana/;
        proxy_redirect http://127.0.0.1:3001/ /6s9ex74204/grafana/;
        proxy_redirect http://localhost:3001/ /6s9ex74204/grafana/;
        # 상대 경로: /login → /6s9ex74204/grafana/login (끝 슬래시 없음)
        proxy_redirect ~^(?!/6s9ex74204/grafana)(/login)$ /6s9ex74204/grafana/login;
        proxy_redirect ~^(?!/6s9ex74204/grafana)(/.*)$ /6s9ex74204/grafana$1;
        
        # 에러 처리
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }
    
    # Grafana 루트 경로 (슬래시 없이)
    location = /6s9ex74204/grafana {
        return 302 /6s9ex74204/grafana/;
    }
    # /login/ (끝 슬래시 있음) → /login 으로 301 한 번만 (Grafana가 /login/ 을 /login 으로 301 하므로, Nginx에서 먼저 통일해 루프 제거)
    location = /6s9ex74204/grafana/login/ {
        return 301 /6s9ex74204/grafana/login;
    }
    
    # 모니터링 루트 경로 (슬래시 포함)
    location = /6s9ex74204/ {
        return 302 /6s9ex74204/grafana/;
    }
    
    # Prometheus → dev.korion.io.kr 로 리다이렉트 (경로 치환)
    location ~ ^/6s9ex74204/prometheus/?(.*)$ {
        return 302 https://dev.korion.io.kr/prometheus/$1;
    }
    
    # 정적 파일 캐싱 (필요 시)
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }

    # 에러 페이지
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ========== 모니터링 전용 (dev.korion.io.kr): Grafana 루트, Prometheus /prometheus ==========
server {
    listen 443 ssl http2;
    server_name dev.korion.io.kr;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/foxya_access.log main;
    error_log /var/log/nginx/foxya_error.log warn;

    # Prometheus UI (subpath) — /prometheus, /prometheus/ 둘 다 프록시 (302 제거해 리다이렉트 루프 방지)
    location /prometheus {
        proxy_pass http://prometheus:9090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        # Prometheus가 보내는 Location을 dev 도메인·끝 슬래시로 통일 (루프 방지)
        proxy_redirect http://prometheus:9090/ https://dev.korion.io.kr/prometheus/;
        proxy_redirect https://dev.korion.io.kr/prometheus https://dev.korion.io.kr/prometheus/;
    }

    # Grafana (루트)
    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
}
