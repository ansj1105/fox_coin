user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker 내부 DNS resolver 설정 (컨테이너 이름 동적 해석)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 로그 포맷
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 성능 최적화
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-yaml;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 클라이언트 요청 크기 제한
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # 프록시 버퍼 설정
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream foxya_api {
        # Use unique container DNS names on the shared Docker network.
        # Generic aliases like "app" can collide with other stacks (for example csms-api).
        server foxya-api:8080 max_fails=3 fail_timeout=30s;
        server foxya-api-2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Admin API upstream (coin_csms 프로젝트)
    # coin_csms는 fox_coin_foxya-network를 external로 사용하므로
    # 같은 네트워크에 있으므로 컨테이너 이름으로 접근 가능
    # 
    # 현재 설정:
    # - coin_csms 컨테이너 이름: csms-api
    # - coin_csms 컨테이너 내부 포트: 8080
    # - coin_csms 네트워크: fox_coin_foxya-network (external)
    # - fox_coin 네트워크: fox_coin_foxya-network (동일)
    # 
    # 주의: Nginx가 시작할 때 csms-api가 없어도 시작할 수 있도록
    # resolver를 사용하여 동적 DNS 해석 (location 블록에서 변수 사용)
    # upstream은 location에서 변수로 동적 해석하므로 여기서는 주석 처리
    # upstream csms_api {
    #     server csms-api:8080 max_fails=3 fail_timeout=30s;
    #     keepalive 32;
    # }
    
    # 설정 파일 포함
    include /etc/nginx/conf.d/*.conf;
}
