global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'foxya-coin-service'

# Alertmanager 설정 (선택사항)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# 스크랩 설정
scrape_configs:
  # API 서버 메트릭 (15초마다 수집 — docker-compose 서비스명 app, 포트 8080)
  - job_name: 'foxya-api'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      # Docker Compose 서비스명 'app' (container_name 아님). 같은 네트워크(fox_coin_foxya-network) 필수
      - targets: ['app:8080']
        labels:
          service: 'api'
          environment: 'production'

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

