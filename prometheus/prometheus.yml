global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'foxya-coin-service'

# Alertmanager 설정 (선택사항)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# 스크랩 설정
scrape_configs:
  # API 서버 메트릭 (5분마다 수집해 로그/부하 완화)
  - job_name: 'foxya-api'
    metrics_path: '/metrics'
    scrape_interval: 5m
    scrape_timeout: 30s
    static_configs:
      # NOTE: 같은 Docker 네트워크에 다른 프로젝트의 `app` alias가 붙으면 잘못된 컨테이너로
      # 라우팅될 수 있어(404 등) 컨테이너 이름을 명시합니다.
      - targets: ['foxya-api:8080']
        labels:
          service: 'api'
          environment: 'production'

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

