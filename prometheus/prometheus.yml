global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'foxya-coin-service'

# Alertmanager ?г…јм ҷ (?мўҸк№®?СӢл№Ҷ)
# alerting:
#   alertmanagers:
#     - static_configs:
