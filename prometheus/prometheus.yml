global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'foxya-coin-service'

# Alertmanager config (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'foxya-api'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      # NOTE: app:8080 can collide with other stacks sharing a Docker network.
      # Pin to the container name in docker-compose.prod.yml to avoid scraping the wrong container (404).
      - targets: ['foxya-api:8080']
        labels:
          service: 'api'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
