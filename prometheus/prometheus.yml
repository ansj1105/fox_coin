scrape_configs:
  - job_name: 'foxya-api'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      # NOTE: `app:8080`?ВҖ еӘӣмҲҲ? ?г…Ҫл“ғ?лҡ°кІ•з‘ң?жҖЁл“ӯм‘Җ?м„Һл’— ?г…»в…Ё ?г…Ҫк№®??appжҖЁ?з•°в‘ёлЈҺ?????лҚүл’ҝ?лҚҲл–Һ.
      # docker-compose.prod.yml??container_name(foxya-api)жҝЎ?жҖЁмўҺм ҷ?лҢҒкҪҢ ?м„ҺгҒӣ??иҖҢв‘ҰлҖ’?лҢҖкј«(404)з‘ң??г…ҪкІ•?в‘әлёҜп§һВҖ ?л”„мҫ¶ ?в‘ёл•І??
      - targets: ['foxya-api:8080']
        labels:
          service: 'api'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
