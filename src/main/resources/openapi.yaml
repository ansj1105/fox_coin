        flag:
          type: string
        totalMinedCoins:
          type: number
          format: decimal
        totalMembers:
          type: integer
          format: int64
        aggregation:
          type: number
          format: decimal

    RankingResponse:
      type: object
      properties:
        top3:
          type: array
          items:
