          type: string
        amount:
          type: number
          format: decimal
        currencyCode:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
        createdAt:
          type: string
          format: date-time

paths:
  # ==================== System ====================
  /health:
    get:
      summary: Health Check
      description: 서버 상태 확인
      tags: [System]
      responses:
        '200':
          description: 서버 상태 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  timestamp:
                    type: integer
                    format: int64

  # ==================== Auth ====================
  /api/v1/auth/check-email:
    post:
      summary: 이메일(아이디) 중복 검사
      description: |
        비인증. available=true면 가입 가능, false면 가입된 아이디입니다.
        클라이언트는 이메일 입력/블러 시 또는 인증번호 받기 전 호출.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          available:
                            type: boolean

  /api/v1/auth/email/send-code:
    post:
      summary: 회원가입용 이메일 인증코드 발송
      description: 6자리 숫자 코드 발송. 60초 쿨다운 권장. 이미 가입된 이메일이면 409.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
        '409':
          description: 가입된 아이디입니다
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: ERROR
                message: "가입된 아이디입니다"
        '400':
          description: 올바른 이메일 주소를 입력해주세요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/email/verify:
    post:
      summary: 회원가입용 이메일 인증 확인
      description: send-code로 발송된 6자리 code가 해당 email과 일치하고 유효기간 내인지 검증.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
        '400':
          description: 인증코드가 일치하지 않거나 만료되었습니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/countries:
    get:
      summary: 회원가입 국가코드 목록 조회
      description: |
        회원가입/프로필에서 사용할 국가코드 목록을 조회합니다.
        기본적으로 ISO 3166-1 alpha-2 전체 + ETC를 반환합니다.
      tags: [Auth]
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryOptionListResponse'

  /api/v1/auth/register:
    post:
      summary: 회원가입 (이메일 인증 완료 후)
      description: |
        인증 이메일=loginId. email, code, password, nickname, name, country 필수.
        referralCode(선택), gender(선택, M/F/O 또는 빈 문자열).
        
        **소셜 로그인 플로우**: code는 빈 문자열 ""로 전송 가능. 이 경우 이메일 인증 단계를 건너뛰고 회원가입 처리.
        password는 KORION WALLET 비밀번호로 사용됨.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, password, seedConfirmed, nickname, name, country, deviceId, deviceType, deviceOs]
              properties:
                email:
                  type: string
                  example: user@example.com
                code:
                  type: string
                  minLength: 0
                  maxLength: 6
                  description: |
                    auth/email/verify에서 검증한 6자리 인증코드.
                    소셜 로그인 플로우에서는 빈 문자열 "" 전송 가능.
                password:
                  type: string
                  minLength: 8
                  description: |
                    8자 이상 (영문·숫자·특수문자 등).
                    소셜 로그인 플로우에서는 KORION WALLET 비밀번호 사용.
                seedConfirmed:
                  type: boolean
                  description: 시드 구문 확인 여부 (시드 구문 확인 후 true)
                signupToken:
                  type: string
                  description: 소셜 가입 토큰 (소셜 가입 플로우에서만 사용)
                referralCode:
                  type: string
                  minLength: 6
                  maxLength: 20
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 8
                  pattern: "^[가-힣a-zA-Z0-9]{1,8}$"
                  description: 닉네임, 한글·영문·숫자 1~8자리
                name:
                  type: string
                  minLength: 1
                  maxLength: 50
                  description: 실제 사용자 이름
                country:
                  type: string
                  description: ISO 3166-1 alpha-2 또는 ETC
                gender:
                  type: string
                  description: M / F / O 또는 빈 문자열(미선택)
                deviceId:
                  type: string
                  description: 디바이스 고유 ID
                deviceType:
                  type: string
                  enum: [WEB, MOBILE]
                deviceOs:
                  type: string
                  enum: [WEB, IOS, ANDROID]
                appVersion:
                  type: string
                  description: 앱 버전
      responses:
        '200':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
                          userId:
                            type: integer
                          loginId:
                            type: string
                          warning:
                            type: boolean
                            description: 경고 여부
                          miningSuspended:
                            type: boolean
                            description: 채굴정지 여부
                          accountBlocked:
                            type: boolean
                            description: 계정차단 여부
                          warning:
                            type: boolean
                            description: 경고 여부
                          miningSuspended:
                            type: boolean
                            description: 채굴정지 여부
                          accountBlocked:
                            type: boolean
                            description: 계정차단 여부
        '400':
          description: 인증코드 오류·만료, 닉네임 중복, 형식 오류 등
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 가입된 아이디입니다
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/login:
    post:
      summary: 로그인
      description: |
        이메일(또는 로그인ID) + 비밀번호. 일반 회원은 password 8자 이상.
        **소셜 로그인 전용 회원**: password 생략 또는 빈 문자열 `""` 전송. 프론트는 `{ password: password ?? '' }`로 항상 `password` 키 포함.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password, deviceId, deviceType, deviceOs]
              properties:
                loginId:
                  type: string
                  description: 이메일 가입 시 이메일 주소 또는 로그인 ID
                  example: user@example.com
                password:
                  type: string
                  description: 8자 이상. 소셜 전용은 "" 허용
                  example: password123!
                deviceId:
                  type: string
                deviceType:
                  type: string
                  enum: [WEB, MOBILE]
                deviceOs:
                  type: string
                  enum: [WEB, IOS, ANDROID]
                appVersion:
                  type: string
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
                          userId:
                            type: integer
                          loginId:
                            type: string
        '401':
          description: '아이디 또는 비밀번호가 일치하지 않습니다.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

