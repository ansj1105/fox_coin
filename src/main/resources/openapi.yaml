        verified:
          type: boolean
          description: 이메일 인증 여부

    CurrentReferralCodeResponse:
      type: object
      properties:
        referralCode:
          type: string
          description: 나를 추천한 사용자의 추천인 코드
          nullable: true

    InviteTierItemDto:
      type: object
      properties:
        inviteCount:
