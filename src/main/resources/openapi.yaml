                  description: true면 다시 보지 않기로 설정
                markShown:
                  type: boolean
                  description: true면 마지막 노출 시각을 현재 시각으로 기록
              additionalProperties: false
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reviewPromptDismissed:
                            type: boolean
