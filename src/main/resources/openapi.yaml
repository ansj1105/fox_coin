      summary: 프리미엄 패키지 구독
      description: |
        구독을 활성화합니다.
        - 권장: `planCode` 전달 (VIP_PASS_7D, VIP_1M, VIP_3M, VIP_6M, VIP_12M)
        - 호환: `packageType + months/days` 전달
      tags: [Subscription]
      security:
