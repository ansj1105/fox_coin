        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    AirdropStatus:
      type: object
      description: 에어드랍 상태
      properties:
        totalReceived:
          type: number
          format: decimal
          description: 락업 해제 금액 (RELEASED && (claimed true 또는 미존재) phase의 amount 합)
        totalReward:
          type: number
          format: decimal
          description: 전체 보상 금액
        nextUnlockDays:
          type: integer
          nullable: true
