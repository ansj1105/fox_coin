          description: 인증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 인증 코드가 유효하지 않거나 만료됨
        '401':
          description: 인증 실패

  # ==================== Security ====================
  /api/v1/security/transaction-password:
    post:
      summary: 거래 비밀번호 설정/변경
      description: 이메일로 발송된 인증 코드를 기반으로 거래 비밀번호(숫자 6자리)를 설정하거나 변경합니다.
      tags: [Security]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - newPassword
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 이메일로 발송된 6자리 숫자 인증 코드
                  example: "123456"
                newPassword:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: '^[0-9]{6}$'
                  description: 거래 비밀번호 (숫자 6자리 문자열)
                  example: "123456"
      responses:
        '200':
          description: 설정/변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 잘못된 요청 또는 인증 코드 오류
        '401':
          description: 인증 실패

  /api/v1/security/login-password:
    post:
      summary: 로그인 비밀번호 변경
      description: |
        이메일 인증 코드 기반으로 로그인 비밀번호를 변경합니다. (일반 회원 전용)
        - `POST /api/v1/users/email/send-code`로 이메일 인증 코드를 먼저 발급받아야 합니다.
        - 소셜 전용 계정(비밀번호 미설정)은 `status: ERROR` 및 `message`로 거부됩니다.
      tags: [Security]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - newPassword
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 이메일로 발송된 6자리 숫자 인증 코드
                  example: "123456"
                newPassword:
                  type: string
                  minLength: 8
                  description: 새 로그인 비밀번호 (8자 이상)
                  example: "new_password_8chars"
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
        '400':
          description: |
            잘못된 요청 (인증 코드 오류, 비밀번호 8자 미만, 소셜 전용 계정 등)
            - `status: ERROR`, `message` 포함
        '401':
          description: 인증 실패

  # ==================== Referral ====================
  /api/v1/referrals/register:
    post:
      summary: 레퍼럴 코드 등록
      description: |
        로그인한 유저가 다른 유저의 추천인 코드를 입력하여 피추천인이 됩니다.
        일반 사용자는 추천인 삭제 후 30일 이내 재등록이 제한됩니다.
        VIP 구독(추천인 재등록 제한 해제 혜택) 사용자는 30일 제한 없이 재등록할 수 있습니다.
        중복 추천 방지를 위해 선택적으로 다음 헤더를 보내면, 동일 추천인 하에서 같은 IP/기기로 이미 등록된 피추천인이 있는지 검사합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      parameters:
        - name: X-Forwarded-For
          in: header
          required: false
          schema:
            type: string
          description: 클라이언트 IP (프록시 경유 시)
        - name: X-Real-IP
          in: header
          required: false
          schema:
            type: string
          description: 클라이언트 IP (대안)
        - name: X-Device-Id
          in: header
          required: false
          schema:
            type: string
          description: 기기 식별자 (중복 추천 판단용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - referralCode
              properties:
                referralCode:
                  type: string
                  minLength: 6
                  maxLength: 20
                  description: 추천인의 레퍼럴 코드
                  example: REFER123
      responses:
        '200':
          description: 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          referrerId:
                            type: integer
                            description: 추천인 ID
                          referredId:
                            type: integer
                            description: 피추천인 ID (본인)
                          status:
                            type: string
        '400':
          description: 잘못된 요청 (이미 등록됨, 유효하지 않은 코드, 자신의 코드)
        '401':
          description: 인증 실패

  /api/v1/referrals/:
    delete:
      summary: 레퍼럴 관계 삭제 (Soft Delete)
      description: 현재 로그인한 사용자의 추천인 관계를 삭제합니다. deleted_at을 현재 시간으로 업데이트하여 Soft Delete를 수행합니다. 데이터는 보존되며 복구 가능합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 등록된 레퍼럴 관계가 없음
        '401':
          description: 인증 실패

  /api/v1/referrals/current:
    get:
      summary: 현재 로그인한 사용자의 추천인 코드 조회
      description: 나를 추천한 사용자의 추천인 코드를 조회합니다. 추천인이 없으면 referralCode는 null입니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CurrentReferralCodeResponse'
              example:
                status: OK
                message: 요청이 완료되었습니다.
                data:
                  referralCode: "DAWKFS"
        '401':
          description: 인증 실패

  /api/v1/referrals/invite-tiers:
    get:
      summary: 친구 초대 → 채굴 속도 보너스 티어 목록 + 유효 직접 초대 수
      description: |
        대시보드 보너스 효율 섹션(친구 초대 티어 + 체크박스)용.
        tiers는 1명 +3%, 5명 +6%, 10명 +10%, 20명 +14%, 50명 +18%, 100명 +22% 고정.
        validDirectReferralCount로 각 티어 달성 여부(체크박스) 연동.
      tags: [Referral]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InviteTiersResponseDto'
              example:
                status: OK
                message: 요청이 완료되었습니다.
                data:
                  tiers:
                    - inviteCount: 1
                      bonusPercent: 3
                    - inviteCount: 5
                      bonusPercent: 6
                    - inviteCount: 10
                      bonusPercent: 10
                    - inviteCount: 20
                      bonusPercent: 14
                    - inviteCount: 50
                      bonusPercent: 18
                    - inviteCount: 100
                      bonusPercent: 22
                  validDirectReferralCount: 5
        '401':
          description: 인증 실패

  /api/v1/referrals/revenue-tiers:
    get:
      summary: 래퍼럴 수익 구간 조회
      description: 래퍼럴 수익 구간 숫자만 조회합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReferralRevenueTierDto'
        '401':
          description: 인증 실패

  /api/v1/referrals/hard:
    delete:
      summary: 레퍼럴 관계 완전 삭제 (Hard Delete)
      description: 데이터베이스에서 완전히 삭제합니다. 복구가 불가능합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 레퍼럴 관계가 존재하지 않음
        '401':
          description: 인증 실패

  /api/v1/referrals/{id}/stats:
    get:
      summary: 레퍼럴 통계 조회
      description: 특정 사용자의 레퍼럴 통계를 조회합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                          directCount:
                            type: integer
                            description: 직접 추천한 총 인원 (모든 상태 포함, 삭제되지 않은 것만)
                          activeTeamCount:
                            type: integer
                            description: ACTIVE 상태인 팀원 수 (삭제되지 않은 것만)
                          totalReward:
                            type: number
                            format: decimal
                            description: 총 리워드
                          todayReward:
                            type: number
                            format: decimal
                            description: 오늘 리워드 (미구현)
        '401':
          description: 인증 실패
        '404':
          description: 사용자를 찾을 수 없음

  /api/v1/referrals/team:
    get:
      summary: 팀 정보 조회
      description: 팀 통계 및 멤버/수익 목록을 조회합니다.
      tags: [Referral]
      security:
        - BearerAuth: []
      parameters:
        - name: tab
          in: query
          required: false
          schema:
            type: string
            enum: [MEMBERS, REVENUE]
            default: MEMBERS
          description: "탭 유형 (MEMBERS: 멤버 목록, REVENUE: 수익 목록)"
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, TODAY, WEEK, MONTH, YEAR]
            default: TODAY
          description: 기간 필터
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 조회 개수
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: 시작 위치
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamInfoResponse'
        '401':
          description: 인증 실패

  # ==================== Airdrop ====================
  /api/v1/airdrop/status:
    get:
      summary: 에어드랍 상태 조회
      description: |
        totalReceived: 락업 해제 금액 (RELEASED 이면서 claimed true 또는 미존재인 phase의 amount 합)
        totalReward: 전체 보상 금액
        nextUnlockDays: 다음 언락까지 남은 일수
        phases: status(RELEASED/PROCESSING), claimed(선택), unlockDate, daysRemaining 포함
      tags: [Airdrop]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AirdropStatus'
        '401':
          description: 인증 실패

  /api/v1/airdrop/phase/{phaseId}/release:
    post:
      summary: Phase Release (락업 해제 반영)
      description: |
        보상형 영상(AdMob Rewarded Video) 시청 완료 후에만 호출.
        status === RELEASED 이고 claimed === false 인 phase만 성공. 성공 시 claimed를 true로 갱신.
      tags: [Airdrop]
      security:
        - BearerAuth: []
      parameters:
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: phase.id
      responses:
        '200':
          description: Release 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AirdropPhaseReleaseResponse'
        '400':
          description: 해제 불가 phase, 이미 Release 완료
        '401':
          description: 인증 실패
        '404':
          description: Phase 없음

  /api/v1/airdrop/transfer:
    post:
      summary: 에어드랍 락업 해제 금액 전송
      description: 락업 해제 금액(RELEASED && claimed true 인 phase 합)을 코리온 지갑으로 전송.
      tags: [Airdrop]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  format: decimal
                  description: 전송 금액
      responses:
        '200':
          description: 전송 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AirdropTransferResponse'
        '400':
          description: 금액 부족/잘못된 금액
        '401':
          description: 인증 실패

  # ==================== Wallet ====================
  /api/v1/wallets:
    post:
      summary: 지갑 생성
      description: 지정한 통화에 대한 새 지갑을 생성합니다. 이미 해당 통화의 지갑이 존재하면 에러가 발생합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWalletRequest'
      responses:
        '200':
          description: 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wallet'
        '400':
          description: 잘못된 요청 (이미 존재하는 지갑, 유효하지 않은 통화 코드 등)
        '401':
          description: 인증 실패
        '404':
          description: 통화를 찾을 수 없음

  /api/v1/wallets/register-challenge:
    post:
      summary: 시드 기반 지갑 등록 - 챌린지 발급
      description: |
        지갑 주소 등록을 위한 서명 메시지를 발급합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, chain]
              properties:
                address:
                  type: string
                chain:
                  type: string
                  enum: [ETH, TRON, BTC]
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                          expiresInSeconds:
                            type: integer
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 실패

  /api/v1/wallets/register:
    post:
      summary: 시드 기반 지갑 등록
      description: |
        챌린지 메시지 서명 검증 후 지갑을 등록합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currencyCode, address, chain, signature]
              properties:
                currencyCode:
                  type: string
                address:
                  type: string
                chain:
                  type: string
                  enum: [ETH, TRON, BTC]
                signature:
                  type: string
      responses:
        '200':
          description: 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wallet'
        '400':
          description: 서명 검증 실패 또는 잘못된 요청
        '401':
          description: 인증 실패

  /api/v1/wallets/register-private-key:
    post:
      summary: 지갑 개인키 등록
      description: |
        등록된 지갑에 개인키를 암호화 저장합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currencyCode, chain, privateKey]
              properties:
                currencyCode:
                  type: string
                chain:
                  type: string
                  enum: [ETH, TRON, BTC]
                privateKey:
                  type: string
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wallet'
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 실패
        '404':
          description: 지갑 또는 통화를 찾을 수 없음

  /api/v1/wallets/my:
    get:
      summary: 내 지갑 목록 조회
      description: 로그인한 사용자의 모든 지갑 정보를 조회합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Wallet'
        '401':
          description: 인증 실패

  /api/v1/wallets/has-seed:
    get:
      summary: 시드 구문 존재 여부 확인
      description: |
        사용자가 시드 기반 지갑(ETH, TRON, BTC)을 하나라도 등록했는지 확인합니다.
        시드 기반 지갑이 하나라도 있으면 시드 구문이 있다고 간주합니다.
      tags: [Wallet]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          hasSeed:
                            type: boolean
                            description: 시드 구문 존재 여부
                            example: true
              examples:
                hasSeed:
                  summary: 시드 구문이 있는 경우
                  value:
                    status: OK
                    message: null
                    data:
                      hasSeed: true
                noSeed:
                  summary: 시드 구문이 없는 경우
                  value:
                    status: OK
                    message: null
                    data:
                      hasSeed: false
        '401':
          description: 인증 실패

  # ==================== Transfer ====================
  /api/v1/transfers/internal:
    post:
      summary: 내부 전송
      description: |
        시스템 내 다른 사용자에게 코인을 전송합니다.
        수신자는 지갑주소, 추천인코드, 또는 유저ID로 지정할 수 있습니다.
      tags: [Transfer]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTransferRequest'
            examples:
              byAddress:
                summary: 지갑 주소로 전송
                value:
                  receiverType: ADDRESS
                  receiverValue: "TXYZabc123..."
                  currencyCode: KRO
                  amount: 100.00
                  memo: "친구에게 전송"
              byReferralCode:
                summary: 추천인 코드로 전송
                value:
                  receiverType: REFERRAL_CODE
                  receiverValue: "ABC123"
                  currencyCode: KRO
                  amount: 50.00
              byUserId:
                summary: 유저 ID로 전송
                value:
                  receiverType: USER_ID
                  receiverValue: "123"
                  currencyCode: KRO
                  amount: 25.00
      responses:
        '200':
          description: 전송 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferResponse'
        '400':
          description: 잘못된 요청 (잔액 부족, 유효하지 않은 수신자, 비활성 지갑 등)
        '401':
          description: 인증 실패
        '404':
          description: 수신자를 찾을 수 없음

  /api/v1/transfers/external:
    post:
      summary: 외부 전송 (출금)
      description: |
        외부 블록체인 지갑으로 코인을 출금합니다.
        TRON 또는 ETH 네트워크를 지원합니다.
        출금 요청은 별도의 Node.js 서비스에서 처리됩니다.
      tags: [Transfer]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalTransferRequest'
            example:
              toAddress: "TXYZabc123def456..."
              currencyCode: FOXYA
              amount: 100.00
              chain: TRON
              memo: "출금 요청"
      responses:
        '200':
          description: 출금 요청 접수됨 (PENDING 상태)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferResponse'
        '400':
          description: 잘못된 요청 (잔액 부족, 유효하지 않은 주소, 비활성 지갑 등)
        '401':
          description: 인증 실패

  /api/v1/transfers/history:
    get:
      summary: 전송 내역 조회
      description: 로그인한 사용자의 전송 내역을 조회합니다.
      tags: [Transfer]
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 조회할 개수
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 시작 위치
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferHistory'
        '401':
          description: 인증 실패

  /api/v1/transfers/{transferId}:
    get:
      summary: 전송 상세 조회
      description: 특정 전송 건의 상세 정보를 조회합니다.
      tags: [Transfer]
      security:
        - BearerAuth: []
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
