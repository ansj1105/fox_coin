      properties:
        isSubscribed:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        packageType:
          type: string
          nullable: true
        planCode:
          type: string
          nullable: true
        miningEfficiencyBonusPercent:
          type: integer
        adFree:
          type: boolean
        autoBoostMining:
          type: boolean
        referralReregisterUnlimited:
          type: boolean
        fullMiningHistoryAccess:
          type: boolean
        profileImageUnlock:
          type: boolean

    SubscriptionPlanResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlanItem'

    SubscriptionPlanItem:
      type: object
      properties:
        planCode:
          type: string
        packageType:
          type: string
        displayName:
          type: string
        durationDays:
          type: integer
        priceKrw:
          type: integer
        priceUsd:
          type: string
        miningEfficiencyBonusPercent:
          type: integer
        adFree:
          type: boolean
        autoBoostMining:
          type: boolean
        referralReregisterUnlimited:
          type: boolean
        fullMiningHistoryAccess:
          type: boolean
        profileImageUnlock:
          type: boolean

    SubscriptionRequest:
      type: object
      properties:
        planCode:
          type: string
          description: 구독 플랜 코드 (VIP_PASS_7D, VIP_1M, VIP_3M, VIP_6M, VIP_12M)
        packageType:
          type: string
          description: 레거시 호환용 구독 타입 (예: VIP)
        months:
          type: integer
          description: 구독 기간 (개월), planCode 미사용 시 적용
        days:
          type: integer
          description: 구독 기간 (일), planCode 미사용 시 적용

    # Review 관련 스키마
    ReviewStatusResponse:
      type: object
      properties:
        hasWrittenReview:
          type: boolean
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    ReviewWriteRequest:
      type: object
      required:
        - platform
      properties:
        platform:
          type: string
          enum: [GOOGLE_PLAY, APP_STORE]
        reviewId:
          type: string
