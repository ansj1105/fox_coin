  # ==================== User ====================
  /api/v1/users/me:
    get:
      summary: 내 정보 조회
      description: 설정/내정보수정용. 내 정보 변경은 7일에 1회만 가능.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          name:
                            type: string
                          nickname:
                            type: string
                          phone:
                            type: string
                            nullable: true
                          gender:
                            type: string
                            description: M / F / O
                          country:
                            type: string
                            description: 국가 코드 (KR, US 등)
                          appReviewRewarded:
                            type: boolean
                            description: 앱 리뷰 보상 지급 완료 여부 (false=미완료, true=완료)
                          reviewPromptDismissed:
                            type: boolean
                            description: 리뷰 유도 팝업 다시 보지 않기 여부
                          reviewPromptLastShownAt:
                            type: string
                            format: date-time
                            nullable: true
                            description: 리뷰 유도 팝업 마지막 노출 시각
        '401':
          description: 인증 실패
    patch:
      summary: 내 정보 수정
      description: 이름(name), 닉네임(nickname), 연락처(phone), 성별(gender), 국가(country) 수정 가능. 내 정보 변경은 7일에 1회만 가능. 빈 문자열 시 name·nickname은 미변경, phone은 삭제. 부분 수정(해당 필드만 전송) 허용.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 50
                nickname:
                  type: string
                  description: 한글·영문·숫자 8자리
                phone:
                  type: string
                  maxLength: 20
                  nullable: true
                gender:
                  type: string
                  description: M / F / O
                country:
                  type: string
                  description: 국가 코드 (KR, US 등)
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
        '400':
          description: 닉네임 중복, 길이 위반 등
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 인증 실패

  /api/v1/users/me/review-prompt:
    patch:
      summary: 리뷰 유도 팝업 상태 업데이트
      description: Security 진입 시 리뷰 유도 팝업 마지막 노출 시각(markShown) 또는 다시 보지 않기(dismissed)를 업데이트합니다.
