                sendFailed:
                  summary: 이메일 발송 실패
                  value:
                    status: ERROR
                    message: "임시 비밀번호 발송에 실패했습니다."

  /api/v1/auth/recovery/challenge:
    post:
      summary: 시드 기반 계정 복구 - 챌린지 발급
      description: |
        복구용 주소에 대해 서명할 메시지(챌린지)를 발급합니다.
        클라이언트는 반환된 message를 체인별 서명 방식으로 서명해야 합니다.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, chain]
              properties:
                address:
                  type: string
                  example: "0xabc..."
                chain:
                  type: string
                  enum: [ETH, TRON, BTC]
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
