          type: array
          items:
            $ref: '#/components/schemas/BannerInfo'

    BannerInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        imageUrl:
          type: string
          format: uri
        linkUrl:
          type: string
          format: uri
          nullable: true
        position:
          type: string
          enum: [RANKING_TOP, DASHBOARD_TOP]
