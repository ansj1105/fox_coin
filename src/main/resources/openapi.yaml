        '404':
          description: 해당 주소의 지갑 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: 입력 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/recovery/reset-password:
