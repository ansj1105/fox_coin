                          message:
                            type: string
        '400':
          description: 서명 검증 실패 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 해당 주소의 지갑 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/google:
    post:
      summary: Google 로그인
      description: |
        Google OAuth 2.0 Authorization Code를 사용한 로그인
        
        **흐름:**
        1. 프론트엔드: Google 로그인 버튼 클릭 → Authorization Code 받기
        2. 프론트엔드 → 백엔드로 code 전달
        3. 백엔드: code로 Google 토큰 교환 + 사용자 정보 조회
        4. 백엔드: 우리 서비스 계정 생성/연동 후 JWT 발급
        
        **제약사항:**
        - `code`: Google OAuth 2.0 Authorization Code (일회용, 짧은 수명)
        - 백엔드에서 Google API를 호출하여 code를 access_token으로 교환
        - 기존 계정이 있으면 연동, 없으면 신규 가입 토큰 발급
        - `isNewUser`: true면 신규 가입 (signupToken 제공), false면 기존 사용자 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
            example:
              code: "4/0AeanS0X..."
              code_verifier: "your_pkce_code_verifier"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GoogleLoginResponseData'
              example:
                status: OK
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  userId: 123
                  loginId: "user@example.com"
                  isNewUser: false
                  signupToken: "social_signup_token"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  summary: 유효하지 않은 Authorization Code
                  value:
                    status: ERROR
                    message: Invalid authorization code
                verifyFailed:
                  summary: Google 토큰 검증 실패
                  value:
                    status: ERROR
                    message: Failed to verify Google token
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/kakao:
    post:
      summary: Kakao 로그인
      description: |
        Kakao OAuth 2.0 Authorization Code를 사용한 로그인

        **흐름:**
        1. 프론트엔드: Kakao 로그인 버튼 클릭 → Authorization Code 받기
        2. 프론트엔드 → 백엔드로 code 전달
        3. 백엔드: code로 Kakao 토큰 교환 + 사용자 정보 조회
        4. 백엔드: 우리 서비스 계정 생성/연동 후 JWT 발급

        **제약사항:**
        - `code`: Kakao OAuth Authorization Code (일회용, 짧은 수명)
        - 백엔드에서 Kakao API를 호출하여 code를 access_token으로 교환
        - 기존 계정이 있으면 연동, 없으면 신규 가입 토큰 발급
        - `isNewUser`: true면 신규 가입 (signupToken 제공), false면 기존 사용자 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
            example:
              code: "3e7f3f0a..."
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/KakaoLoginResponseData'
              example:
                status: OK
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  userId: 123
                  loginId: "user@example.com"
                  isNewUser: false
                  signupToken: "social_signup_token"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  summary: 유효하지 않은 Authorization Code
                  value:
                    status: ERROR
                    message: Invalid authorization code
                verifyFailed:
                  summary: Kakao 토큰 검증 실패
                  value:
                    status: ERROR
                    message: Failed to verify Kakao token
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/apple:
    post:
      summary: Apple 로그인
      description: |
        Apple OAuth Authorization Code를 사용한 로그인

        **흐름:**
        1. 프론트엔드: Apple 로그인 버튼 클릭 → Authorization Code 받기
        2. 프론트엔드 → 백엔드로 code 전달
        3. 백엔드: code로 Apple 토큰 교환 + id_token 검증
        4. 백엔드: 우리 서비스 계정 생성/연동 후 JWT 발급
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleLoginRequest'
            example:
              code: "c5d6f..."
              idToken: "eyJhbGciOi..."
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AppleLoginResponseData'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/refresh:
    post:
      summary: Access Token 재발급 (refreshToken)
      description: |
        accessToken 만료 시 refreshToken만으로 accessToken( 및 refreshToken 로테이션) 재발급.
        Authorization 헤더 없이 body의 refreshToken만으로 호출. 401 시 클라이언트는 토큰 제거 후 로그인 화면 이동.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                required: [status, accessToken]
                properties:
                  status:
                    type: string
                    example: OK
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                    description: 로테이션 시에만 포함. 미갱신 시 생략.
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: ERROR
                message: "Invalid or expired refresh token"

  /api/v1/auth/access-token:
    get:
      summary: Access Token 재발급 (Bearer)
      description: Authorization Bearer(accessToken)로 새로운 Access Token 발급
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          userId:
                            type: integer
        '401':
          description: 인증 실패

  /api/v1/auth/refresh-token:
    get:
      summary: Refresh Token 재발급
      description: 새로운 Refresh Token 발급
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          refreshToken:
                            type: string
                          userId:
                            type: integer
        '401':
          description: 인증 실패

  /api/v1/auth/api-key:
    post:
      summary: API Key 생성
      description: 외부 서비스 연동을 위한 API Key 생성
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: API Key 이름
                  example: My Trading Bot
                description:
                  type: string
                  maxLength: 255
                  description: API Key 설명 (선택)
                  example: 자동 거래 봇용 API Key
      responses:
        '200':
          description: API Key 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          apiKey:
                            type: string
                          name:
                            type: string
                          createdAt:
                            type: string
                            format: date-time
        '400':
          description: 잘못된 요청

  /api/v1/auth/api-key/reissue:
    get:
      summary: API Key 재발급
      description: 기존 API Key를 무효화하고 새로운 API Key 발급
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: API Key 재발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          apiKey:
                            type: string
                          createdAt:
                            type: string
                            format: date-time
        '401':
          description: 인증 실패

  /api/v1/auth/logout:
    post:
      summary: 로그아웃
      description: |
        사용자 로그아웃 및 JWT 토큰 무효화
        
        - Authorization 헤더에 포함된 토큰을 블랙리스트에 추가하여 무효화
        - allDevices 파라미터가 true인 경우, 해당 사용자의 모든 디바이스에서 로그아웃
        - 클라이언트는 로컬 스토리지에서 accessToken, refreshToken, userId 제거 필요
      tags: [Auth]
      security:
        - BearerAuth: []
      parameters:
        - name: allDevices
          in: query
          description: 모든 디바이스에서 로그아웃 여부
          required: false
          schema:
            type: boolean
            default: false
          example: false
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LogoutResponse'
              examples:
                success:
                  value:
                    status: OK
                    message: Logged out successfully
                    data:
                      status: OK
                      message: Logged out successfully
        '401':
          description: 인증 실패 (유효하지 않은 토큰)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidToken:
                  value:
                    status: ERROR
                    message: Invalid token
                    code: 401

