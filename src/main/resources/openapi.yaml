      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwapRequest'
            example:
              fromCurrencyCode: ETH
              toCurrencyCode: USDT
              fromAmount: 1.0
              network: Ether
      responses:
        '200':
          description: 스왑 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SwapResponse'
        '400':
          description: 잘못된 요청 (잔액 부족, 유효하지 않은 통화 등)
        '401':
          description: 인증 실패

