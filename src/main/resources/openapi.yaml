        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 미션 ID
      responses:
        '200':
          description: 완료 처리 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 잘못된 요청 (이미 완료된 미션 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: ERROR
                message: 미션을 완료할 수 없습니다.
        '401':
          description: 인증 실패
        '404':
          description: 미션을 찾을 수 없음

