          description: 인증 실패
        '404':
          description: 전송 내역을 찾을 수 없음

  # ==================== Swap ====================
  /api/v1/swap:
    post:
      summary: 스왑 실행
      description: |
        한 토큰을 다른 토큰으로 스왑합니다.
        예: ETH → USDT (Ether 네트워크)
