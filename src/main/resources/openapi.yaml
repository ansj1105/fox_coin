          description: tab이 REVENUE일 때 반환
        total:
          type: integer
          format: int64
          description: 전체 개수
        limit:
          type: integer
          description: 조회 개수
        offset:
          type: integer
          description: 시작 위치

    TeamSummaryInfo:
      type: object
      properties:
        totalRevenue:
          type: number
          format: decimal
          description: 팀의 체굴된 총 수익 (래퍼럴 수익)
        todayRevenue:
          type: number
          format: decimal
          description: 팀의 금일 채굴된 총 수익
