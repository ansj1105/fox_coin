      responses:
        '200':
          description: 발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
                          expiresIn:
                            type: integer
                            format: int64
        '401':
          description: API Key/Secret 인증 실패

  /api/v1/client/refresh:
    post:
      summary: 클라이언트 토큰 갱신
