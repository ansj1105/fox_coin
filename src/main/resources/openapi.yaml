        '401':
          description: 인증 실패

  /api/v1/mining/credit-video:
    post:
      summary: 영상 시청 1회 = 1시간 채굴 세션 시작
      description: |
        부스터 영상 시청 1회당 1시간 채굴 세션을 시작합니다. 채굴량은 즉시 전량 적립되지 않고, 1시간에 걸쳐 시간당 비율로 적립(settle)됩니다.
        - 이메일 인증 완료 필요
        - 마지막 영상 시청 후 1시간이 지나야 다음 영상 시청 가능 (miningUntil 이전에는 400)
        - 일일 영상 시청 횟수(레벨별)·일일 최대 채굴량 제한 적용
        - 세션 완료 시 채굴 내역(history)에 1건 기록, 래퍼럴 수익 연동
      tags: [Mining]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 세션 생성 성공 (credited true). amount는 해당 세션의 1시간 채굴량(rate_per_hour)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          amount:
                            type: number
                            format: decimal
                            description: 이번 세션의 1시간 채굴량(rate_per_hour). 1시간에 걸쳐 비례 적립됨
                          credited:
                            type: boolean
                            description: 세션 생성(적립) 여부
        '400':
          description: |
            - 이메일 미인증
            - 1시간이 지나지 않음 (다음 영상 시청 가능 시각은 GET /mining/info 의 miningUntil)
            - 일일 영상 시청 한도 도달
        '401':
          description: 인증 실패

  /api/v1/mining/history:
    get:
      summary: 체굴 내역 조회
      description: |
        체굴 내역을 조회합니다. 래퍼럴 수익은 제외하고 체굴 내역만 조회됩니다.
        
        **period 파라미터:**
        - ALL: 전체
        - TODAY: 오늘
        - WEEK: 최근 7일
        - MONTH: 최근 30일
        - YEAR: 최근 1년
        
        **type:**
        - BROADCAST_PROGRESS: 방송진행
        - BROADCAST_WATCH: 방송시청
      tags: [Mining]
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          description: 기간 (ALL, TODAY, WEEK, MONTH, YEAR)
          schema:
            type: string
            enum: [ALL, TODAY, WEEK, MONTH, YEAR]
            default: TODAY
        - name: limit
          in: query
          description: 조회 개수
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          description: 시작 위치
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MiningHistoryResponse'
              example:
                status: OK
                message: 요청이 완료되었습니다.
                data:
                  items:
                    - id: 1
                      level: 1
                      nickname: testuser
                      amount: 0.00012345
                      type: BROADCAST_PROGRESS
                      status: COMPLETED
                      createdAt: "2025-10-26T18:46:00Z"
                    - id: 2
                      level: 1
                      nickname: testuser
                      amount: 0.00012345
                      type: BROADCAST_WATCH
                      status: COMPLETED
                      createdAt: "2025-10-26T18:30:00Z"
                  total: 100
                  totalAmount: 1.23456789
                  limit: 20
                  offset: 0
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 사용자를 찾을 수 없습니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

