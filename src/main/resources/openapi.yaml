      description: 카카오, 구글, 이메일 계정을 연동합니다.
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkSocialRequest'
      responses:
        '200':
          description: 연동 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 실패

  /api/v1/auth/account:
    delete:
      summary: 회원 탈퇴
      description: |
        회원 탈퇴 및 관련 데이터 Soft Delete 처리
        
        - 비밀번호 확인 필요
        - 사용자, 지갑, 전송 내역 등 모든 관련 데이터 Soft Delete 처리
        - 탈퇴는 되돌릴 수 없는 작업이므로 확인 모달에서 경고 메시지 표시 권장
        - 클라이언트는 로컬 스토리지에서 accessToken, refreshToken, userId 제거 필요
        - 탈퇴 후 로그인 페이지로 리다이렉트
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  minLength: 8
                  maxLength: 20
                  description: 비밀번호 (확인용)
                  example: Test1234!@
      responses:
        '200':
          description: 탈퇴 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteAccountResponse'
              examples:
                success:
                  value:
                    status: OK
                    message: Account deleted successfully
                    data:
                      status: OK
                      message: Account deleted successfully
        '400':
          description: 잘못된 요청 (탈퇴 실패)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                deletionFailed:
                  value:
                    status: ERROR
                    message: Account deletion failed
                    code: 400
        '401':
          description: 인증 실패 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidPassword:
                  value:
                    status: ERROR
                    message: Invalid password
                    code: 401
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/verify-phone:
    post:
      summary: 본인인증(휴대폰) 등록
      description: 휴대폰 번호를 인증하여 등록합니다.
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPhoneRequest'
      responses:
        '200':
          description: 인증 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '400':
          description: 잘못된 요청 (인증 코드 불일치 등)
        '401':
          description: 인증 실패

  # ==================== Client ====================
  /api/v1/client/token:
