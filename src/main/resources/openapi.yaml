  /api/v1/swap/quote:
    get:
      summary: 스왑 예상 수량 조회
      description: 스왑 예상 수량을 조회합니다. 실시간 가격, 수수료, 스프레드를 계산합니다.
      tags: [Transfer]
      security:
        - BearerAuth: []
      parameters:
        - name: fromCurrencyCode
          in: query
          required: true
          schema:
            type: string
          description: "FROM 통화 코드 (예: ETH)"
          example: ETH
        - name: toCurrencyCode
          in: query
          required: true
          schema:
            type: string
          description: "TO 통화 코드 (예: USDT)"
          example: USDT
        - name: fromAmount
          in: query
          required: true
          schema:
            type: number
            format: decimal
          description: FROM 금액
          example: 1.0
        - name: network
          in: query
          required: true
          schema:
            type: string
          description: "네트워크 (예: Ether, TRON)"
          example: Ether
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SwapQuote'
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 실패
        '404':
          description: 통화를 찾을 수 없음

  /api/v1/swap/currencies:
