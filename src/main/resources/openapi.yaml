openapi: 3.0.0
info:
  title: Foxya Coin Service API
  description: 멀티체인 암호화폐 지갑 관리 및 레퍼럴 시스템 API
  version: 1.0.0
  contact:
    name: Foxya Team

servers:
  - url: /
    description: Current Server (Auto-detect)

tags:
  - name: System
    description: 시스템 관련 API
  - name: Auth
    description: 인증 관련 API
  - name: User
    description: 사용자 관련 API
  - name: Referral
    description: 레퍼럴 관련 API
  - name: Wallet
    description: 지갑 관련 API
  - name: Transfer
    description: 전송 관련 API
  - name: Bonus
    description: 보너스 채굴 효율 관련 API
  - name: Mining
    description: 채굴 관련 API
  - name: Level
    description: 레벨 관련 API
  - name: Notice
    description: 공지사항 관련 API
  - name: Notification
    description: 알림 관련 API
  - name: Inquiry
    description: 문의하기 관련 API
  - name: Mission
    description: 오늘의 미션 관련 API
  - name: Subscription
    description: 프리미엄 구독 관련 API
  - name: Review
    description: 리뷰 관련 API
  - name: Agency
    description: 에이전시 관련 API
  - name: Ranking
    description: 랭킹 관련 API
  - name: Banner
    description: 배너 광고 관련 API
  - name: Security
    description: 보안 관련 API (거래 비밀번호 등)
  - name: Client
    description: 외부 서비스 연동 API
  - name: Airdrop
    description: 에어드랍 (Phase Release, 락업 해제 금액 전송)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK, ERROR]
        message:
          type: string
        data:
          type: object
        code:
          type: integer
          
    Error:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          example: ERROR
        message:
          type: string
        code:
          type: integer

    # Auth 관련 스키마
    LogoutResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK]
          example: OK
        message:
          type: string
          example: Logged out successfully

    DeleteAccountRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 8
          maxLength: 20
          description: 비밀번호 (확인용)
          example: Test1234!@

    DeleteAccountResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK]
          example: OK
        message:
          type: string
          example: Account deleted successfully

    GoogleLoginRequest:
      type: object
      required:
        - code
        - deviceId
        - deviceType
        - deviceOs
      properties:
        code:
          type: string
          description: Google OAuth 2.0 Authorization Code
          example: "4/0AeanS0X..."
        code_verifier:
          type: string
          description: PKCE code_verifier (모바일 앱에서 사용 시 선택)
        platform:
          type: string
          description: 클라이언트 플랫폼 (WEB 또는 ANDROID)
          example: ANDROID
        deviceId:
          type: string
        deviceType:
          type: string
          enum: [WEB, MOBILE]
        deviceOs:
          type: string
          enum: [WEB, IOS, ANDROID]
        appVersion:
          type: string

    GoogleLoginResponseData:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: JWT Refresh Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userId:
          type: integer
          format: int64
          description: 사용자 ID
          example: 123
        loginId:
          type: string
          description: 로그인 ID (이메일)
          example: "user@example.com"
        isNewUser:
          type: boolean
          description: 신규 사용자 여부
          example: false
        signupToken:
          type: string
          description: 신규 사용자용 소셜 가입 토큰 (신규 사용자일 때만 제공)
        warning:
          type: boolean
          description: 경고 여부
        miningSuspended:
          type: boolean
          description: 채굴정지 여부
        accountBlocked:
          type: boolean
          description: 계정차단 여부
        subscribed:
          type: boolean
          description: 활성 구독 여부
        adFree:
          type: boolean
          description: 광고 제거 혜택 여부
        autoBoostMining:
          type: boolean
          description: 하루 1회 부스터 시작 후 자동 연속 채굴 혜택 여부
        vipMiningEfficiencyBonusPercent:
          type: integer
          description: VIP 구독 기반 추가 채굴 효율(%)
        fullMiningHistoryAccess:
          type: boolean
          description: 채굴 전체 내역 보기 권한 여부
        warning:
          type: boolean
          description: 경고 여부
        miningSuspended:
          type: boolean
          description: 채굴정지 여부
        accountBlocked:
          type: boolean
          description: 계정차단 여부
        warning:
          type: boolean
          description: 경고 여부
        miningSuspended:
          type: boolean
          description: 채굴정지 여부
        accountBlocked:
          type: boolean
          description: 계정차단 여부

    GoogleLoginResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK]
          example: OK
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT Access Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refreshToken:
              type: string
              description: JWT Refresh Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            userId:
              type: integer
              format: int64
              description: 사용자 ID
              example: 123
            loginId:
              type: string
              description: 로그인 ID (이메일)
              example: "user@example.com"
            isNewUser:
              type: boolean
              description: 신규 사용자 여부
              example: false
            warning:
              type: boolean
              description: 경고 여부
            miningSuspended:
              type: boolean
              description: 채굴정지 여부
            accountBlocked:
              type: boolean
              description: 계정차단 여부
            warning:
              type: boolean
              description: 경고 여부
            miningSuspended:
              type: boolean
              description: 채굴정지 여부
            accountBlocked:
              type: boolean
              description: 계정차단 여부
            warning:
              type: boolean
              description: 경고 여부
            miningSuspended:
              type: boolean
              description: 채굴정지 여부
            accountBlocked:
              type: boolean
              description: 계정차단 여부

    KakaoLoginRequest:
      type: object
      required:
        - code
        - deviceId
        - deviceType
        - deviceOs
      properties:
        code:
          type: string
          description: Kakao OAuth Authorization Code
          example: "3e7f3f0a..."
        platform:
          type: string
          description: 클라이언트 플랫폼 (WEB 또는 ANDROID)
          example: ANDROID
        deviceId:
          type: string
        deviceType:
          type: string
          enum: [WEB, MOBILE]
        deviceOs:
          type: string
          enum: [WEB, IOS, ANDROID]
        appVersion:
          type: string

    KakaoLoginResponseData:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: JWT Refresh Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userId:
          type: integer
          format: int64
          description: 사용자 ID
          example: 123
        loginId:
          type: string
          description: 로그인 ID (이메일)
          example: "user@example.com"
        isNewUser:
          type: boolean
          description: 신규 사용자 여부
          example: false
        signupToken:
          type: string
          description: 신규 사용자용 소셜 가입 토큰 (신규 사용자일 때만 제공)

    KakaoLoginResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK]
          example: OK
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT Access Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refreshToken:
              type: string
              description: JWT Refresh Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            userId:
              type: integer
              format: int64
              description: 사용자 ID
              example: 123
            loginId:
              type: string
              description: 로그인 ID (이메일)
              example: "user@example.com"
            isNewUser:
              type: boolean
              description: 신규 사용자 여부
              example: false

    AppleLoginRequest:
      type: object
      required:
        - code
        - deviceId
        - deviceType
        - deviceOs
      properties:
        code:
          type: string
          description: Apple OAuth Authorization Code
          example: "c5d6f..."
        idToken:
          type: string
          description: Apple ID Token (선택)
        platform:
          type: string
          description: 클라이언트 플랫폼 (WEB 또는 IOS)
          example: IOS
        deviceId:
          type: string
        deviceType:
          type: string
          enum: [WEB, MOBILE]
        deviceOs:
          type: string
          enum: [WEB, IOS, ANDROID]
        appVersion:
          type: string

    AppleLoginResponseData:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: JWT Refresh Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userId:
          type: integer
          format: int64
          description: 사용자 ID
          example: 123
        loginId:
          type: string
          description: 로그인 ID (이메일)
          example: "user@example.com"
        isNewUser:
          type: boolean
          description: 신규 사용자 여부
          example: false
        signupToken:
          type: string
          description: 신규 사용자용 소셜 가입 토큰 (신규 사용자일 때만 제공)

    AppleLoginResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [OK]
          example: OK
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT Access Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refreshToken:
              type: string
              description: JWT Refresh Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            userId:
              type: integer
              format: int64
              description: 사용자 ID
              example: 123
            loginId:
              type: string
              description: 로그인 ID (이메일)
              example: "user@example.com"
            isNewUser:
              type: boolean
              description: 신규 사용자 여부
              example: false

    # User 관련 스키마
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        loginId:
          type: string
        referralCode:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        role:
          type: string
          enum: [USER, ADMIN]
        createdAt:
          type: string
          format: date-time

    # Wallet 관련 스키마
    Wallet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        currencyId:
          type: integer
          format: int64
        address:
          type: string
          description: 지갑 주소
        balance:
          type: number
          format: decimal
        verified:
          type: boolean
          description: 시스템 또는 사용자 입금으로 지갑 활성화가 확인되었는지 여부
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [ACTIVE, INACTIVE, FROZEN]
        createdAt:
          type: string
          format: date-time

    CreateWalletRequest:
      type: object
      required:
        - currencyCode
      properties:
        currencyCode:
          type: string
          minLength: 1
          maxLength: 10
          description: "통화 코드 (예: KRWT, USDT, ETH, KRO 등)"
          example: KRWT

    # Transfer 관련 스키마
    InternalTransferRequest:
      type: object
      required:
        - receiverType
        - receiverValue
        - currencyCode
        - amount
      properties:
        receiverType:
          type: string
          enum: [ADDRESS, REFERRAL_CODE, USER_ID]
          description: 수신자 식별 유형
        receiverValue:
          type: string
          description: 수신자 식별 값 (지갑주소/추천인코드/유저ID)
        currencyCode:
          type: string
          description: 통화 코드
          example: KRO
        amount:
          type: number
          format: decimal
          description: 전송 금액
          example: 100.00
        memo:
          type: string
          description: 메모 (선택)
          maxLength: 255

    ExternalTransferRequest:
      type: object
      required:
        - toAddress
        - currencyCode
        - amount
        - chain
      properties:
        toAddress:
          type: string
          description: 외부 지갑 주소
          example: TXYZabc123...
        currencyCode:
          type: string
          description: 통화 코드
          example: KRO
        amount:
          type: number
          format: decimal
          description: 전송 금액
          example: 100.00
        chain:
          type: string
          enum: [TRON, ETH]
          description: 블록체인 네트워크
        memo:
          type: string
          description: 메모 (선택)
          maxLength: 255

    TransferResponse:
      type: object
      properties:
        transferId:
          type: string
          description: 전송 고유 ID
        transferType:
          type: string
          enum: [INTERNAL, EXTERNAL]
          description: 전송 유형
        transactionType:
          type: string
          enum: [WITHDRAW, TOKEN_DEPOSIT, PAYMENT_DEPOSIT, SWAP, EXCHANGE]
          description: 거래 유형
        orderNumber:
          type: string
          description: 주문번호
        senderId:
          type: integer
          format: int64
        receiverId:
          type: integer
          format: int64
        toAddress:
          type: string
          description: 외부 전송 시 수신 지갑 주소
        senderAddress:
          type: string
          description: 입금 시 송신 지갑 주소
        currencyCode:
          type: string
        fromCurrencyCode:
          type: string
          description: 스왑/환전 시 FROM 토큰
        toCurrencyCode:
          type: string
          description: 스왑/환전 시 TO 토큰
        amount:
          type: number
          format: decimal
        fromAmount:
          type: number
          format: decimal
          description: 스왑/환전 시 FROM 금액
        toAmount:
          type: number
          format: decimal
          description: 스왑/환전 시 TO 금액
        fee:
          type: number
          format: decimal
        networkFee:
          type: number
          format: decimal
          description: 외부 전송 시 네트워크 수수료
        network:
          type: string
          description: 네트워크 (Ether, TRON 등)
        depositMethod:
          type: string
          enum: [CARD, BANK_TRANSFER, PAY]
          description: 입금 방법 (결제 입금 시)
        paymentAmount:
          type: number
          format: decimal
          description: 결제금액 (결제 입금 시)
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
          format: date-time
        sweepErrorMessage:
          type: string
          enum: [WAITING_LIQUIDITY, PENDING, COMPLETED, FAILED, CANCELLED, CONFIRMED, SUBMITTED]
        memo:
          type: string
        createdAt:
          type: string
          format: date-time

    TransferHistory:
      type: object
      properties:
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/TransferResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # Swap 관련 스키마
    SwapRequest:
      type: object
      required:
        - fromCurrencyCode
        - toCurrencyCode
        - fromAmount
        - network
      properties:
        fromCurrencyCode:
          type: string
          description: FROM 통화 코드
          example: ETH
        toCurrencyCode:
          type: string
          description: TO 통화 코드
          example: USDT
        fromAmount:
          type: number
          format: decimal
          description: FROM 금액
          example: 1.0
        network:
          type: string
          description: 네트워크
          example: Ether

    SwapResponse:
      type: object
      properties:
        swapId:
          type: string
          description: 스왑 고유 ID
        orderNumber:
          type: string
          description: 주문번호
        fromCurrencyCode:
          type: string
        toCurrencyCode:
          type: string
        fromAmount:
          type: number
          format: decimal
        toAmount:
          type: number
          format: decimal
        network:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        sweepStatus:
          type: string
        sweepTxHash:
          type: string
        sweepRequestedAt:
          type: string
          format: date-time
        sweepSubmittedAt:
          type: string
          format: date-time
        sweepFailedAt:
          type: string
