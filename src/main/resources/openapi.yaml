  /api/v1/mining/info:
    get:
      summary: 채굴 정보 조회
      description: |
        채굴 정보를 조회합니다. 호출 시 진행 중인 채굴 세션을 먼저 정산(settle)한 뒤 응답합니다.
        - todayMiningAmount: 1시간 세션에 걸쳐 적립된 금일 채굴량 합계
        - adWatchCount: 오늘 시작한 채굴 세션 수 (부스터 잔여 = maxAdWatchCount - adWatchCount)
        - miningUntil: 활성 채굴 세션이 있으면 세션 종료 시각(ISO-8601). 이 시각까지 다음 영상 시청 불가
      tags: [Mining]
      security:
        - BearerAuth: []
      responses:
