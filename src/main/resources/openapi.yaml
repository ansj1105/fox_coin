  /api/v1/auth/send-temp-password:
    post:
      summary: 비밀번호 찾기 (임시 비밀번호 발송)
      description: |
        가입 이메일로 임시 비밀번호를 발송합니다.
        - 일반 회원(이메일·비밀번호 가입)만 대상. 소셜 전용·이메일 미등록 계정은 해당 없음.
        - 임시 비밀번호는 DB에 저장(기존 비밀번호 대체) 후 메일 발송.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
        '404':
          description: 등록된 이메일과 일치하는 계정 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: ERROR
                message: "등록된 이메일과 일치하는 계정을 찾을 수 없습니다."
        '400':
          description: 임시 비밀번호 발송 불가(소셜 전용 등) 또는 이메일 발송 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                cannotSend:
                  summary: 임시 비밀번호 발송 불가
                  value:
                    status: ERROR
