          format: int64
        rank:
          type: integer
        nickname:
          type: string
        profileImage:
          type: string
          nullable: true
        level:
          type: integer
        levelName:
          type: string
        totalAmount:
          type: number
          format: decimal
          description: 체굴된 전체 코인 + 레퍼럴 수익
        teamCount:
          type: integer
          format: int64
          description: 팀원 수
        country:
